<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rbox-Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --ink: #1A1A18;
    --muted: #6B6B65;
    --accent: #2D5BE3;
    --accent-light: #EEF2FD;
    --border: #E4E3DD;
    --radius: 12px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── Page header ── */
  header {
    margin-bottom: 48px;
  }

  header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 12px;
  }

  header p {
    font-size: 16px;
    color: var(--muted);
    max-width: 520px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  section { margin-bottom: 56px; }

  /* ── Card grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }

  .card:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .card-image {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--bg);
  }

  /* placeholder when no real image */
  .card-image.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: var(--accent-light);
  }

  .card-body {
    padding: 16px 18px 18px;
  }

  .card-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .card-body h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .card-body p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 14px;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .card-link:hover { border-bottom-color: var(--accent); }
  .card-link svg { flex-shrink: 0; }

  /* ── Horizontal list: image left, links right ── */
  .list-item {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    transition: box-shadow 0.2s ease;
  }

  .list-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

  .list-thumb {
    width: 90px;
    height: 72px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .list-content { flex: 1; min-width: 0; }

  .list-content h3 {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .list-content p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .link-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .link-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    background: var(--accent-light);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid transparent;
    transition: border-color 0.15s, background 0.15s;
  }

  .link-pill:hover {
    border-color: var(--accent);
    background: #fff;
  }

  /* ── Hero media strip: image + side links ── */
  .media-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
  }

  @media (max-width: 600px) {
    .media-strip { grid-template-columns: 1fr; }
  }

  .strip-image {
    width: 100%;
    height: 240px;
    object-fit: cover;
    display: block;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .strip-aside {
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-left: 1px solid var(--border);
  }

  .strip-aside h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .strip-aside p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.55;
  }

  .strip-links { display: flex; flex-direction: column; gap: 10px; }

  .strip-link {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    transition: background 0.15s, border-color 0.15s;
  }

  .strip-link:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }

  .strip-link .icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  /* ── Footer ── */
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <p class="eyebrow">Review Here</p>
    <h1>{{screentitle}}</h1>
    <p>This is where genuine reviews arrive</p>
  </header>

  <section>
    <p class="section-label"></p>
    <div class="card-grid">
      {% for movie in pageobj %}
            <div class="card">
              <img style="height:300px ; width:300px;" src="{{movie.img_src}}" alt="Movie Poster">
              <div class="card-body">
                <span class="card-tag">{{ movie.year }}</span>
                <h3>{{movie.title}}</h3>
                <p>{{movie.genre}}</p>
                <a href="{% url "screen:detail" slug=movie.slug %}" class="card-link" target="_blank">
                  Read review
                  <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M2.5 9.5L9.5 2.5M9.5 2.5H4M9.5 2.5V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
              </div>
            </div>
      {% endfor %}
          </div>
        </section>
    <footer>
        {% if pageobj.has_previous %}
          <a class="card-link" href="?page={{ pageobj.previous_page_number }}">Previous</a>
        {% endif %}

        {% if pageobj.has_next %}
          <a class="card-link" href="?page={{ pageobj.next_page_number }}">Next</a>
          <a class="card-link" href="?page={{ pageobj.paginator.num_pages }}">Last</a>
        {% endif %}
        </footer>

</div>
</body>
</html>
